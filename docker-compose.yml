services:
  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      WORKER_GRPC_ADDR: ":50051"
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: "weather-worker"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    depends_on:
      - jaeger
    ports:
      - "50051:50051"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      GATEWAY_HTTP_ADDR: ":8081"
      WORKER_GRPC_ADDR: "worker:50051"
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: "weather-gateway"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    depends_on:
      - jaeger
      - worker
    ports:
      - "8081:8081"
